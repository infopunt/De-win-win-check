<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>De Win-Win Check</title>
    <style>
        /* CSS: Dit zorgt voor de mooie opmaak van de pagina */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            text-align: center;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 20px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #2ecc71;
        }
        #resultaat {
            margin-top: 30px;
            padding: 20px;
            background-color: #e8f8f5;
            border-left: 5px solid #27ae60;
            border-radius: 5px;
            display: none; /* Dit verbergt de uitslag totdat er op de knop is geklikt */
        }
        .opdracht {
            font-style: italic;
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌍 Project: De Win-Win Check</h2>
        <p style="text-align: center;">Scoor voor je portemonnee én de planeet!</p>

        <label for="prijsFiets">Hoeveel euro kost jouw fiets (per jaar)?</label>
        <input type="number" id="prijsFiets" placeholder="Bijv. 150" required>

        <label for="keuzeVervoer">Met welk vervoer wil je de fiets vergelijken?</label>
        <select id="keuzeVervoer">
            <option value="A">De Bus</option>
            <option value="B">De Trein</option>
            <option value="C">De Auto</option>
        </select>

        <button onclick="berekenWinWin()">Bereken mijn score!</button>

        <div id="resultaat"></div>
    </div>

    <script>
        function berekenWinWin() {
            // Haal de waardes op die de leerling heeft ingevuld
            let prijsFiets = parseFloat(document.getElementById('prijsFiets').value);
            let keuze = document.getElementById('keuzeVervoer').value;
            let resultaatDiv = document.getElementById('resultaat');

            // Controleer of de leerling wel een getal heeft ingevuld
            if (isNaN(prijsFiets) || prijsFiets < 0) {
                alert("Vul a.u.b. een geldige prijs in voor je fiets.");
                return;
            }

            // Vaste gegevens
            let onderhoud = 50;
            let totaalFiets = prijsFiets + onderhoud;
            let co2Fiets = 0;

            let scorePortemonnee = 0;
            let scoreNatuur = 0;
            let anderVervoer = "";
            let kostenAnder = 0;
            let co2Ander = 0;

            // Bepaal de kosten en uitstoot van het gekozen vervoer
            if (keuze === "A") {
                anderVervoer = "de Bus";
                kostenAnder = 215;
                co2Ander = 800;
                scoreNatuur = 30;
            } else if (keuze === "B") {
                anderVervoer = "de Trein";
                kostenAnder = 350;
                co2Ander = 400;
                scoreNatuur = 40;
            } else {
                anderVervoer = "de Auto";
                kostenAnder = 1200;
                co2Ander = 2000;
                scoreNatuur = 10;
            }

            // De berekening
            let besparingGeld = kostenAnder - totaalFiets;
            let besparingCo2 = co2Ander - co2Fiets;

            // Opbouwen van de tekst voor het resultaat
            let htmlOutput = "<h3>JOUW RESULTAAT:</h3>";

            if (besparingGeld > 0) {
                htmlOutput += `<p>💰 <strong>JIJ:</strong> Je bespaart ${besparingGeld} euro per jaar!</p>`;
                scorePortemonnee = 50;
            } else {
                let verlies = Math.abs(besparingGeld);
                htmlOutput += `<p>💰 <strong>JIJ:</strong> Je fiets is dit jaar ${verlies} euro duurder dan ${anderVervoer}.</p>`;
                scorePortemonnee = 10;
            }

            htmlOutput += `<p>🌳 <strong>DE NATUUR:</strong> Je bespaart ${besparingCo2} kg CO2 door te fietsen!</p>`;
            scoreNatuur += 10; // Bonus voor de fietskeuze

            // De Eindscore
            let eindscore = scorePortemonnee + scoreNatuur;
            htmlOutput += `<hr><h4>⭐ JOUW EINDSCORE: ${eindscore} / 100</h4>`;

            if (eindscore >= 80) {
                htmlOutput += "<p>🌍 <strong>Super!</strong> Zowel jij als de natuur worden hier slapend rijk van!</p>";
            } else if (eindscore >= 50) {
                htmlOutput += "<p>👍 <strong>Goed gedaan!</strong> Je zoekt een mooie balans tussen geld en groen.</p>";
            } else {
                htmlOutput += "<p>🤔 <strong>Interessant!</strong> Kan je een keuze maken die beter is voor je bankrekening of de planeet?</p>";
            }

            // Instructie voor Google Classroom
            htmlOutput += `<div class="opdracht">--- OPDRACHT VOOR DE LEERLING ---<br>Maak nu een screenshot van dit resultaat en upload de foto in Google Classroom bij de opdracht.</div>`;

            // Laat de verborgen div op het scherm zien met de nieuwe tekst
            resultaatDiv.innerHTML = htmlOutput;
            resultaatDiv.style.display = "block";
        }
    </script>

</body>
</html>
